name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5.0.3
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v5.0.3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate package READMEs from docs
        run: pnpm turbo run gen:readmes

      - name: Check for README drift
        run: |
          if [ -n "$(git status --porcelain packages/*/README.md)" ]; then
            echo "Error: Package READMEs are out of sync with canonical docs."
            echo "The following files were modified by gen:readmes:"
            git status --porcelain packages/*/README.md
            echo ""
            echo "Please run 'pnpm turbo run gen:readmes' locally and commit the updated READMEs."
            exit 1
          fi
          echo "README sync check passed: all package READMEs are up to date."

      - name: Run monorepo CI
        run: pnpm run ci

      - name: Check publish artifacts
        run: pnpm run release:check

  sync-generated-artifacts:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5.0.3
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v5.0.3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate package READMEs from docs
        run: pnpm turbo run gen:readmes

      - name: Run monorepo CI
        run: pnpm run ci

      - name: Create PR for generated README updates
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          add-paths: |
            packages/*/README.md
          branch: chore/generated-artifacts-sync
          commit-message: "chore: sync generated readmes"
          title: "chore: sync generated readmes"
          body: |
            This PR was created automatically by CI.

            It syncs generated artifacts that can change after running the full gate pipeline:
            - `packages/*/README.md` (generated from canonical docs)
