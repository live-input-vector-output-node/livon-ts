name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package README sync
        run: pnpm docs:check:package-readmes

      - name: Lint
        run: pnpm turbo run lint --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Test
        run: pnpm exec vitest run --passWithNoTests --coverage --coverage.reporter=text --coverage.reporter=html --coverage.reporter=lcov --coverage.reporter=json-summary

      - name: Update coverage badge
        run: node tools/update-coverage-badge.mjs coverage/coverage-summary.json .github/badges/coverage.json

      - name: Build
        run: pnpm turbo run build --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Update package size badges
        run: node tools/update-size-badges.mjs .github/badges

      - name: Commit badge artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet .github/badges; then
            echo "Badge artifacts are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/*.json
          git commit -m "chore: update badge artifacts [skip ci]"
          git push
