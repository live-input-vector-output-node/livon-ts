name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm turbo run build --filter='./packages/*' --filter='./apps/*' --concurrency=4
