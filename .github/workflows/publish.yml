name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '**/CHANGELOG.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish tag from changeset mode
        id: release_tag
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const prePath = path.join(root, '.changeset', 'pre.json');
          let tag = 'latest';

          if (fs.existsSync(prePath)) {
            const parsed = JSON.parse(fs.readFileSync(prePath, 'utf8'));
            if (parsed && parsed.mode === 'pre' && typeof parsed.tag === 'string' && parsed.tag.trim().length > 0) {
              tag = parsed.tag.trim();
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`);
          console.log(`Resolved publish tag: ${tag}`);
          NODE

      - name: Validate package versions
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.cwd();
          const publishTag = (process.env.PUBLISH_TAG || 'latest').trim();
          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const expected = publishTag === 'latest'
            ? /^\d+\.\d+\.\d+$/
            : new RegExp(`^\\d+\\.\\d+\\.\\d+-${escapeRegExp(publishTag)}\\.\\d+$`);
          const packagesDir = path.join(root, 'packages');
          const invalid = fs.readdirSync(packagesDir)
            .map((name) => path.join(packagesDir, name, 'package.json'))
            .filter((file) => fs.existsSync(file))
            .map((file) => ({ file, json: JSON.parse(fs.readFileSync(file, 'utf8')) }))
            .filter(({ json }) => typeof json.version !== 'string' || !expected.test(json.version));
          if (invalid.length > 0) {
            console.error(`Invalid package versions for "${publishTag}" publish:`);
            invalid.forEach(({ file, json }) => {
              console.error(`${path.relative(root, file)} -> ${json.version}`);
            });
            process.exit(1);
          }
          NODE
        env:
          PUBLISH_TAG: ${{ steps.release_tag.outputs.tag }}

      - name: Run monorepo CI
        run: pnpm run ci

      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat <<EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          npm whoami

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          pnpm changeset:publish --tag "$TAG"

      - name: Tag published packages as latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const root = process.cwd();
          const packagesDir = path.join(root, 'packages');
          const packageFiles = fs.readdirSync(packagesDir)
            .map((name) => path.join(packagesDir, name, 'package.json'))
            .filter((file) => fs.existsSync(file));

          const publishable = packageFiles
            .map((file) => JSON.parse(fs.readFileSync(file, 'utf8')))
            .filter((pkg) => pkg.private !== true)
            .filter((pkg) => typeof pkg.name === 'string' && typeof pkg.version === 'string');

          publishable.forEach((pkg) => {
            const spec = `${pkg.name}@${pkg.version}`;
            console.log(`Tagging ${spec} as latest`);
            execSync(`npm dist-tag add ${spec} latest`, { stdio: 'inherit' });
          });
          NODE
