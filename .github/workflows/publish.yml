name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '**/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag for publish
        required: false
        default: rc
        type: string
      release_candidate:
        description: RC candidate number expected in versions (for example 1 for -rc.1)
        required: false
        default: "1"
        type: string
      dry_run:
        description: Run publish in dry-run mode
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package versions
        run: |
          RC="${{ inputs.release_candidate }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            RC=""
          fi
          NPM_TAG="${{ inputs.npm_tag }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ -z "$NPM_TAG" ]; then
            NPM_TAG="rc"
          fi
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.cwd();
          const rc = (process.env.RC || '').trim();
          const npmTag = (process.env.NPM_TAG || 'rc').trim();
          const expected = npmTag === 'rc'
            ? (rc ? new RegExp(`^\\d+\\.\\d+\\.\\d+-rc\\.${rc}$`) : /^\d+\.\d+\.\d+-rc\.\d+$/)
            : /^\d+\.\d+\.\d+$/;
          const packagesDir = path.join(root, 'packages');
          const invalid = fs.readdirSync(packagesDir)
            .map((name) => path.join(packagesDir, name, 'package.json'))
            .filter((file) => fs.existsSync(file))
            .map((file) => ({ file, json: JSON.parse(fs.readFileSync(file, 'utf8')) }))
            .filter(({ json }) => typeof json.version !== 'string' || !expected.test(json.version));
          if (invalid.length > 0) {
            console.error('Invalid package versions for RC publish:');
            invalid.forEach(({ file, json }) => {
              console.error(`${path.relative(root, file)} -> ${json.version}`);
            });
            process.exit(1);
          }
          NODE
        env:
          RC: ${{ inputs.release_candidate }}
          NPM_TAG: ${{ inputs.npm_tag }}

      - name: Lint
        run: pnpm turbo run lint --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm turbo run build --filter='./packages/*' --filter='./apps/*' --concurrency=4

      - name: Publish packages (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          TAG="${{ inputs.npm_tag }}"
          pnpm changeset --version
          pnpm changeset status --verbose
          pnpm -r --filter './packages/*' publish --access public --tag "$TAG" --no-git-checks --dry-run --report-summary

      - name: Validate npm token
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure npm authentication
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat <<EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          npm whoami

      - name: Publish packages
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="rc"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.npm_tag }}" ]; then
            TAG="${{ inputs.npm_tag }}"
          fi
          pnpm changeset:publish --tag "$TAG"

      - name: Tag published packages as latest
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const root = process.cwd();
          const packagesDir = path.join(root, 'packages');
          const packageFiles = fs.readdirSync(packagesDir)
            .map((name) => path.join(packagesDir, name, 'package.json'))
            .filter((file) => fs.existsSync(file));

          const publishable = packageFiles
            .map((file) => JSON.parse(fs.readFileSync(file, 'utf8')))
            .filter((pkg) => pkg.private !== true)
            .filter((pkg) => typeof pkg.name === 'string' && typeof pkg.version === 'string');

          publishable.forEach((pkg) => {
            const spec = `${pkg.name}@${pkg.version}`;
            console.log(`Tagging ${spec} as latest`);
            execSync(`npm dist-tag add ${spec} latest`, { stdio: 'inherit' });
          });
          NODE
