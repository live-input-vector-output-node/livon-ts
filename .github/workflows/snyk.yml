name: Snyk

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SNYK_ORG_ID: 7fbf21c5-d717-474c-b5b3-d403a11d6834

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5.0.4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure SNYK_TOKEN is configured
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "Error: SNYK_TOKEN secret is not configured."
            echo "Add SNYK_TOKEN in repository secrets to enable the required Snyk gate."
            exit 1
          fi

      - name: Run Snyk dependency test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: pnpm dlx snyk@latest test --org="${SNYK_ORG_ID}" --all-projects --detection-depth=6 --severity-threshold=high
