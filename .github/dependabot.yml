version: 2

multi-ecosystem-groups:
  all-version-updates:
    schedule:
      interval: "daily"

updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
      - "/tools/*"
      - "/website"
    rebase-strategy: "auto"
    open-pull-requests-limit: 1
    patterns:
      - "*"
    multi-ecosystem-group: "all-version-updates"

  - package-ecosystem: "github-actions"
    directory: "/"
    rebase-strategy: "auto"
    open-pull-requests-limit: 1
    patterns:
      - "*"
    multi-ecosystem-group: "all-version-updates"
